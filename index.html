<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metas & Mercado</title>

<style>
:root{--bg:#0f1115;--p:#151922;--c:#1c2230;--a:#c9a24d;--t:#e6e6e6;--m:#8a8f9c;--r:10px}
*{box-sizing:border-box;font-family:system-ui,-apple-system,Segoe UI,sans-serif}
body{margin:0;background:var(--bg);color:var(--t)}
.wrap{max-width:900px;margin:auto;padding:10px}
.tabs{display:flex;gap:6px}
.tab{flex:1;padding:9px;border:0;border-radius:var(--r);background:var(--p);color:var(--m);font-weight:600;cursor:pointer}
.tab.on{background:var(--a);color:#000}
.sec{display:none;margin-top:10px}
.sec.on{display:block}
.card{background:var(--c);border-radius:var(--r);padding:8px;margin-bottom:8px}
.row{display:flex;gap:6px}
input,button{padding:8px;border-radius:8px;border:0;font-size:13px}
input{flex:1;background:#0f131c;color:var(--t)}
button{background:var(--a);color:#000;font-weight:600}
.item,.prod{display:flex;gap:6px;align-items:center;margin-top:6px}
.item span,.prod span{flex:1}
.x{background:#0f131c;color:var(--m)}
.head{display:flex;gap:6px;align-items:center}
.title{flex:1;font-weight:600}
@media(max-width:600px){
.row,.item,.prod,.head{flex-direction:column}
}
</style>
</head>

<body>
<div class="wrap">

  <div class="tabs">
    <button type="button" class="tab on" onclick="openTab('metas',this)">Metas</button>
    <button type="button" class="tab" onclick="openTab('mercado',this)">Mercado</button>
  </div>

  <div id="metas" class="sec on">
    <div class="card">
      <div class="row">
        <input id="metaI" placeholder="Nueva meta">
        <button type="button" onclick="addMeta()">Añadir</button>
      </div>
      <div id="metaL"></div>
    </div>
  </div>

  <div id="mercado" class="sec">
    <div class="card">
      <div class="row">
        <input id="siteI" placeholder="Sitio de compra">
        <button type="button" onclick="addSite()">Añadir sitio</button>
      </div>
    </div>
    <div id="siteL"></div>
  </div>

</div>

<script>
function openTab(id,btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'))
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'))
  btn.classList.add('on')
  document.getElementById(id).classList.add('on')
}

function addMeta(){
  var v=metaI.value.trim(); if(!v)return
  metaL.insertAdjacentHTML('beforeend',
    '<div class="item"><span>'+v+'</span><button type="button" class="x" onclick="this.parentNode.remove()">✕</button></div>'
  )
  metaI.value=''
}

function addSite(){
  var v=siteI.value.trim(); if(!v)return
  siteL.insertAdjacentHTML('beforeend',
    '<div class="card">'+
      '<div class="head">'+
        '<div class="title">'+v+'</div>'+
        '<button type="button" class="x" onclick="this.closest(\'.card\').remove()">✕</button>'+
      '</div>'+
      '<div class="row" style="margin-top:6px">'+
        '<input placeholder="Producto">'+
        '<button type="button" onclick="addProd(this)">Añadir</button>'+
      '</div>'+
      '<div class="plist"></div>'+
    '</div>'
  )
  siteI.value=''
}

function addProd(btn){
  var i=btn.previousElementSibling
  var v=i.value.trim(); if(!v)return
  btn.closest('.card').querySelector('.plist')
    .insertAdjacentHTML('beforeend',
      '<div class="prod"><span>'+v+'</span><button type="button" class="x" onclick="this.parentNode.remove()">✕</button></div>'
    )
  i.value=''
}
</script>

</body>
</html>
