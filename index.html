<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Familia Pedroza Hernández · Metas y Mercado</title>

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

  <style>
    :root{
      --bg:#eef2f7;
      --card:#fff;
      --text:#0f172a;
      --muted:#64748b;
      --border:#e2e8f0;
      --shadow:0 10px 24px rgba(15,23,42,.06);
      --shadow2:0 18px 40px rgba(15,23,42,.08);
      --radius:18px;
      --accent:#0f172a;
      --short:#f97316;
      --medium:#10b981;
      --long:#3b82f6;
      --buy:#8b5cf6;
      --ok:#16a34a;
      --danger:#dc2626;
      --transition:.15s ease;
    }

    *{box-sizing:border-box;margin:0;padding:0}

    body{
      font-family:'Inter',sans-serif;
      background:linear-gradient(145deg,#f7f9fc,#edf2f7);
      color:var(--text);
      padding:8px;
    }

    .container{
      max-width:1500px;
      margin:auto;
      background:rgba(255,255,255,.85);
      border-radius:22px;
      padding:12px;
      box-shadow:var(--shadow2);
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:10px;
    }

    h1{
      font-size:1.25rem;
      font-weight:700;
      display:flex;
      align-items:center;
      gap:10px;
    }

    h1 i{
      width:36px;height:36px;
      border-radius:50%;
      background:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:var(--shadow);
    }

    .family-badge{
      padding:8px 14px;
      border-radius:999px;
      background:#fff;
      border:1px solid var(--border);
      font-size:.9rem;
      color:var(--muted);
      box-shadow:var(--shadow);
    }

    .tabs{
      display:flex;
      gap:6px;
      margin-bottom:10px;
    }

    .tab-btn{
      flex:1;
      padding:9px;
      border-radius:999px;
      border:1px solid var(--border);
      background:#fff;
      font-weight:600;
      cursor:pointer;
      transition:var(--transition);
      color:var(--muted);
    }

    .tab-btn.active{
      background:var(--accent);
      color:#fff;
      border-color:var(--accent);
    }

    .panel{display:none}
    .panel.active{display:block}

    .quick-form{
      display:grid;
      gap:8px;
      margin-bottom:10px;
    }

    .meta-form{grid-template-columns:1fr auto}
    .market-form{grid-template-columns:1fr 1fr auto}

    input,select,button{
      padding:11px 12px;
      border-radius:12px;
      border:1px solid var(--border);
      font:inherit;
    }

    button{
      background:var(--accent);
      color:#fff;
      font-weight:600;
      cursor:pointer;
    }

    .board{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      gap:10px;
    }

    .column{
      background:#fff;
      border-radius:18px;
      border:1px solid var(--border);
      box-shadow:var(--shadow);
      display:flex;
      flex-direction:column;
    }

    .column-header{
      padding:10px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      border-bottom:1px solid var(--border);
    }

    .list-container{
      padding:8px;
    }

    .item-list,.mini-list{
      list-style:none;
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .item,.mini-item{
      display:flex;
      align-items:center;
      gap:8px;
      padding:8px;
      border-radius:14px;
      border:1px solid #edf2f7;
    }

    .check{
      width:18px;height:18px;
    }

    .text{
      flex:1;
      font-size:.9rem;
    }

    .market-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      gap:10px;
    }

    .group-card{
      border-radius:18px;
      border:1px solid var(--border);
      background:#fff;
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .group-header{
      padding:10px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      border-bottom:1px solid var(--border);
    }

    .group-body{
      padding:10px;
    }

    .mini-form{
      display:grid;
      grid-template-columns:1fr auto;
      gap:6px;
      margin-bottom:8px;
    }

    @media(max-width:600px){
      h1{font-size:1.1rem}
      .market-form{grid-template-columns:1fr}
    }
  </style>
</head>

<body>
<div class="container">

  <div class="topbar">
    <h1><i class="fas fa-clipboard-list"></i> Pedroza Hernández</h1>
    <div class="family-badge">Familia unida ❤️</div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="metas">Metas</button>
    <button class="tab-btn" data-tab="mercado">Mercado</button>
  </div>

  <section id="metas" class="panel active">
    <!-- metas igual que tu archivo -->
  </section>

  <section id="mercado" class="panel">
    <!-- mercado igual que tu archivo -->
  </section>

</div>

<script>
  const tabs=document.querySelectorAll('.tab-btn');
  const panels=document.querySelectorAll('.panel');
  tabs.forEach(t=>{
    t.onclick=()=>{
      tabs.forEach(b=>b.classList.remove('active'));
      panels.forEach(p=>p.classList.remove('active'));
      t.classList.add('active');
      document.getElementById(t.dataset.tab).classList.add('active');
    }
  });
</script>

</body>
</html>
